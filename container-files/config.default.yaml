# add this modeline for validation in vscode
yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json
#
# llama-swap YAML configuration example
# -------------------------------------
#
# healthCheckTimeout: number of seconds to wait for a model to be ready to serve requests
# - optional, default: 120
# - minimum value is 15 seconds, anything less will be set to this value
# This may have to include the time to download the models for the first time
# so a bigger value may be needed.
healthCheckTimeout: 600

# logLevel: sets the logging value
# - optional, default: info
# - Valid log levels: debug, info, warn, error

# logToStdout: controls what is logged to stdout
# - optional, default: "proxy"
# - valid values:
#   - "proxy": logs generated by llama-swap when swapping models,
#      handling requests, etc.
#   - "upstream": a copy of an upstream processes stdout logs
#   - "both": both the proxy and upstream logs interleaved together
#   - "none": no logs are ever written to stdout
logToStdout: "both"

# metricsMaxInMemory: maximum number of metrics to keep in memory
# - optional, default: 1000
# - controls how many metrics are stored in memory before older ones are discarded
# - useful for limiting memory usage when processing large volumes of metrics

# captureBuffer: how many MBs to allocate for storing request/response captures
# - optional, default: 10
# - set to 0 to disable
captureBuffer: 100

# startPort: sets the starting port number for the automatic ${PORT} macro.
# - optional, default: 5800
# - the ${PORT} macro can be used in model.cmd and model.proxy settings
# - it is automatically incremented for every model that uses it

# sendLoadingState: inject loading status updates into the reasoning (thinking)
# field
# - optional, default: false
# - when true, a stream of loading messages will be sent to the client in the
#   reasoning field so chat UIs can show that loading is in progress.
# - see #366 for more details
sendLoadingState: false

# includeAliasesInList: present aliases within the /v1/models OpenAI API listing
# - optional, default: false
# - when true, model aliases will be output to the API model listing duplicating
#   all fields except for Id so chat UIs can use the alias equivalent to the original.

# globalTTL: the default TTL in seconds before unloading a model
# - optional, default: 0 (never automatically unload)
# - must be >= 0
globalTTL: 1800

# macros: a dictionary of string substitutions
# - optional, default: empty dictionary
# - macros are reusable snippets
# - used in a model's cmd, cmdStop, proxy, checkEndpoint, filters.stripParams
# - useful for reducing common configuration settings
# - macro names are strings and must be less than 64 characters
# - macro names must match the regex ^[a-zA-Z0-9_-]+$
# - macro names must not be a reserved name: PORT or MODEL_ID
# - macro values can be numbers, bools, or strings
# - macros can contain other macros, but they must be defined before they are used
# - environment variables can be referenced with ${env.VAR_NAME} syntax
#   - env macros are substituted first, before regular macros
#   - if the env var is not set, config loading will fail with an error
macros:
  "model-url": http://127.0.0.1:${PORT}

  "llama": >
    llama-server
    --port ${PORT}
  "llama-vulkan": >
    /opt/llama/vulkan/llama-server
    --port ${PORT}
  "sd": >
    sd-server
    --listen-port ${PORT}
  "sd-vulkan": >
    sd-server-vulkan
    --listen-port ${PORT}
  "default_ctx": 32768
  "models_dir": "${env.HOME}/data/models"
  "sd_models_dir": "${models_dir}/sd"
  "default_llama_args": "--ctx-size ${default_ctx} --models_dir ${models_dir}"

# models: a dictionary of model configurations
# - required
# - each key is the model's ID, used in API requests
# - model settings have default values that are used if they are not defined here
# - the model's ID is available in the ${MODEL_ID} macro, also available in macros defined above
# - below are examples of the all the settings a model can have

models:
  "qwen2.5-coder-1.5b-base":
    macros:
      "default_ctx": 3072
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF:Q4_K_M
  "Qwen2.5-Coder-7B":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf Qwen/Qwen2.5-Coder-7B-Instruct-GGUF:Q8_0
  "Qwen2.5-Coder-14B":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf Qwen/Qwen2.5-Coder-14B-Instruct-GGUF:Q5_K_M
  "Qwopus3.5-9B-v3":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf Jackrong/Qwopus3.5-9B-v3-GGUF:Q5_K_S
  "Qwopus3.5-27B-v3":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf Jackrong/Qwopus3.5-27B-v3-GGUF:Q2_K
  "gemma-4-E4B":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf unsloth/gemma-4-E4B-it-GGUF:Q5_K_M
  "gemma-4-26B-A4B":
    proxy: "${model-url}"
    cmd: >
      ${llama}
      ${default_llama_args}
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:UD-IQ2_M
  "Z-Image-Turbo":
    proxy: "${model-url}"
    checkEndpoint: /
    cmd: >
      ${sd}
      --diffusion-model ${sd_models_dir}/z_image_turbo-Q6_K.gguf
      --vae ${sd_models_dir}/flux1-dev.ae.safetensors
      --llm ${sd_models_dir}/Qwen3-4B-2507-Instruct-Uncensored-HauhauCS-Aggressive-Q6_K.gguf
      --diffusion-fa
      --cfg-scale 1.0
  "Z-Image":
    proxy: "${model-url}"
    checkEndpoint: /
    cmd: >
      ${sd}
      --diffusion-model ${sd_models_dir}/z-image-Q6_K.gguf
      --vae ${sd_models_dir}/flux1-dev.ae.safetensors
      --llm ${sd_models_dir}/Qwen3-4B-2507-Instruct-Uncensored-HauhauCS-Aggressive-Q6_K.gguf
      --diffusion-fa
      --cfg-scale 5.0
  "Chroma":
    proxy: "${model-url}"
    checkEndpoint: /
    cmd: >
      ${sd}
      --diffusion-model  ${sd_models_dir}/chroma-unlocked-v50-Q5_0.gguf
      --vae ${sd_models_dir}/flux1-dev.ae.safetensors
      --t5xxl ${sd_models_dir}/t5xxl-Q5_0.gguf
      --sampling-method euler
      --cfg-scale 4.0
#      --chroma-disable-dit-mask # Although it is documented to use this, it crashes with "buffer not set" error when generating an image


# This persistent model can be used in continue.dev, for autocomplete
# so we don't want to unload it if it is used
# It must be small enough to fit in vram with any of the models above
groups:
  "persistent-group":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen2.5-coder-1.5b-base"

